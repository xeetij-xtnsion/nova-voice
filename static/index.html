<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Voice AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #2a9d8f;
            --teal-dark: #1f7a6f;
            --teal-light: #40b4a6;
            --navy: #1a4b6e;
            --navy-dark: #0f3552;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --green: #22c55e;
            --red: #ef4444;
            --amber: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f3552 0%, #1a4b6e 40%, #1f7a6f 70%, #2a9d8f 100%);
            background-attachment: fixed;
            color: #334155;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ── Card Logo ────────────────────────── */
        .card-logo {
            text-align: center;
            padding: 24px 32px 16px;
            border-bottom: 1px solid var(--gray-200);
        }

        .card-logo img {
            height: 44px;
            width: auto;
            object-fit: contain;
        }

        /* ── Main Card ───────────────────────── */
        .main-card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 24px;
            box-shadow: 0 25px 60px -15px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Status Bar ──────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 24px;
            border-bottom: 1px solid var(--gray-200);
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-500);
        }

        .btn-refresh {
            margin-left: auto;
            width: 32px;
            height: 32px;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            background: var(--white);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-400);
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .btn-refresh:hover {
            border-color: var(--teal);
            color: var(--teal);
            background: rgba(42,157,143,0.04);
        }

        .btn-refresh:active svg {
            animation: spin 0.5s ease;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--gray-300);
            transition: background 0.3s;
            flex-shrink: 0;
        }

        .status-dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.4); }
        .status-dot.connecting { background: var(--amber); animation: pulse 1.2s infinite; }
        .status-dot.error { background: var(--red); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Voice Visualizer ────────────────── */
        .voice-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            gap: 20px;
        }


        .voice-orb-wrap {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Outer rings */
        .orb-ring {
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid transparent;
            transition: all 0.4s ease;
        }

        .orb-ring-1 { inset: -4px; }
        .orb-ring-2 { inset: -14px; }
        .orb-ring-3 { inset: -24px; }

        /* Core orb */
        .voice-orb {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gray-100), var(--gray-200));
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            transition: all 0.4s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .voice-icon {
            width: 36px;
            height: 36px;
            color: var(--gray-400);
            transition: all 0.3s;
        }

        /* ── Idle (off) ───────────────────────── */
        .voice-orb-wrap.idle .voice-orb {
            background: linear-gradient(135deg, var(--gray-100), var(--gray-200));
        }

        /* ── Ready (connected, subtle breathing) ── */
        .voice-orb-wrap.ready .voice-orb {
            background: linear-gradient(135deg, rgba(42,157,143,0.06), rgba(42,157,143,0.03));
            box-shadow: 0 0 24px rgba(42,157,143,0.08);
            animation: orb-breathe 3s ease-in-out infinite;
        }

        .voice-orb-wrap.ready .voice-icon { color: var(--teal); opacity: 0.6; }

        .voice-orb-wrap.ready .orb-ring-1 {
            border-color: rgba(42,157,143,0.12);
        }

        @keyframes orb-breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 24px rgba(42,157,143,0.08); }
            50% { transform: scale(1.02); box-shadow: 0 0 32px rgba(42,157,143,0.12); }
        }

        /* ── Listening (user speaking — active glow) ── */
        .voice-orb-wrap.listening .voice-orb {
            background: linear-gradient(135deg, rgba(42,157,143,0.18), rgba(42,157,143,0.1));
            box-shadow: 0 0 50px rgba(42,157,143,0.25);
            animation: orb-glow 0.6s ease-in-out infinite alternate;
        }

        .voice-orb-wrap.listening .voice-icon { color: var(--teal); }

        .voice-orb-wrap.listening .orb-ring-1 {
            border-color: rgba(42,157,143,0.6);
            animation: ring-glow 0.8s ease-in-out infinite alternate;
        }

        .voice-orb-wrap.listening .orb-ring-2 {
            border-color: rgba(42,157,143,0.3);
            animation: ring-glow 0.8s ease-in-out infinite alternate 0.15s;
        }

        .voice-orb-wrap.listening .orb-ring-3 {
            border-color: rgba(42,157,143,0.12);
            animation: ring-glow 0.8s ease-in-out infinite alternate 0.3s;
        }

        @keyframes orb-glow {
            0% { transform: scale(1); box-shadow: 0 0 40px rgba(42,157,143,0.2); }
            100% { transform: scale(1.06); box-shadow: 0 0 60px rgba(42,157,143,0.35); }
        }

        @keyframes ring-glow {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* ── Speaking (Nova responding — wave radiating out) ── */
        .voice-orb-wrap.speaking .voice-orb {
            background: linear-gradient(135deg, rgba(26,75,110,0.18), rgba(42,157,143,0.12));
            box-shadow: 0 0 50px rgba(26,75,110,0.2);
            animation: orb-pulse 1s ease-in-out infinite;
        }

        .voice-orb-wrap.speaking .voice-icon { color: var(--navy); }

        .voice-orb-wrap.speaking .orb-ring-1 {
            border-color: rgba(26,75,110,0.45);
            animation: ring-wave 1.4s ease-out infinite;
        }

        .voice-orb-wrap.speaking .orb-ring-2 {
            border-color: rgba(26,75,110,0.25);
            animation: ring-wave 1.4s ease-out infinite 0.25s;
        }

        .voice-orb-wrap.speaking .orb-ring-3 {
            border-color: rgba(26,75,110,0.1);
            animation: ring-wave 1.4s ease-out infinite 0.5s;
        }

        @keyframes orb-pulse {
            0%, 100% { transform: scale(1); }
            40% { transform: scale(1.05); }
            70% { transform: scale(0.98); }
        }

        @keyframes ring-wave {
            0% { transform: scale(0.97); opacity: 1; }
            100% { transform: scale(1.12); opacity: 0; }
        }

        /* ── Buttons ─────────────────────────── */
        .btn {
            padding: 14px 36px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: -0.1px;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--teal), var(--teal-dark));
            color: var(--white);
            box-shadow: 0 4px 16px rgba(42,157,143,0.3);
        }

        .btn-start:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(42,157,143,0.4);
        }

        .btn-end {
            background: linear-gradient(135deg, var(--red), #dc2626);
            color: var(--white);
            box-shadow: 0 4px 16px rgba(239,68,68,0.3);
        }

        .btn-end:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(239,68,68,0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ── Transcript ──────────────────────── */
        .transcript-section {
            border-top: 1px solid var(--gray-200);
        }

        .transcript-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            cursor: pointer;
            user-select: none;
        }

        .transcript-header h3 {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--gray-400);
        }

        .transcript-toggle {
            font-size: 11px;
            color: var(--teal);
            font-weight: 600;
        }

        .transcript {
            max-height: 360px;
            overflow-y: auto;
            padding: 0 24px 20px 24px;
            scroll-behavior: smooth;
        }

        .transcript::-webkit-scrollbar { width: 4px; }
        .transcript::-webkit-scrollbar-track { background: transparent; }
        .transcript::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }

        .transcript-empty {
            color: var(--gray-400);
            text-align: center;
            padding: 24px 16px;
            font-size: 13px;
            line-height: 1.6;
        }

        .message {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 88%;
            font-size: 13.5px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user {
            background: linear-gradient(135deg, var(--navy), var(--navy-dark));
            color: var(--white);
            margin-left: auto;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(26,75,110,0.2);
        }

        .message.assistant {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-bottom-left-radius: 4px;
        }

        .message .label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            opacity: 0.6;
        }

        .message.user .label { color: rgba(255,255,255,0.7); }
        .message.assistant .label { color: var(--teal); opacity: 1; }

        .tool-indicator {
            font-size: 12px;
            color: var(--gray-400);
            font-style: italic;
            margin-bottom: 8px;
            padding-left: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tool-indicator::before {
            content: '';
            width: 14px;
            height: 14px;
            border: 2px solid var(--gray-300);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Footer ──────────────────────────── */
        .footer {
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.45);
            font-weight: 500;
        }

        .footer a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
        }

        /* ── Responsive ──────────────────────── */
        @media (max-width: 520px) {
            body { padding: 12px; }
            .app-container { max-width: 100%; }
            .voice-area { padding: 24px 16px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-card">
            <div class="card-logo">
                <img src="/static/logo.webp" alt="Nova Naturopathic Integrative Clinic">
            </div>
            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Ready to connect</span>
                <button class="btn-refresh" onclick="location.reload()" title="Refresh">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                </button>
            </div>

            <div class="voice-area">
                <div class="voice-orb-wrap idle" id="voiceOrb">
                    <div class="orb-ring orb-ring-3"></div>
                    <div class="orb-ring orb-ring-2"></div>
                    <div class="orb-ring orb-ring-1"></div>
                    <div class="voice-orb">
                        <svg class="voice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-start" id="startBtn" onclick="startConversation()">
                        Start Conversation
                    </button>
                    <button class="btn btn-end" id="endBtn" onclick="endConversation()" style="display:none">
                        End Conversation
                    </button>
                </div>
            </div>

            <div class="transcript-section">
                <div class="transcript-header" onclick="toggleTranscript()">
                    <h3>Transcript</h3>
                    <span class="transcript-toggle" id="transcriptToggle">Show</span>
                </div>
                <div class="transcript" id="transcript" style="display:none">
                    <div class="transcript-empty">
                        Conversation transcript will appear here.
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            Powered by <a href="https://xtnsion.ai" target="_blank">Xtnsion.AI</a>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        const orb = document.getElementById('voiceOrb');
        let speakingTimeout = null;

        function setOrbState(state) {
            orb.className = 'voice-orb-wrap ' + state;
        }

        // Hook into data channel messages for voice state
        const origHandler = handleDataChannelMessage;
        handleDataChannelMessage = function(event) {
            const msg = JSON.parse(event.data);

            // Nova is speaking
            if (msg.type === 'response.audio_transcript.delta') {
                if (speakingTimeout) clearTimeout(speakingTimeout);
                setOrbState('speaking');
            }

            // Nova done speaking — back to ready
            if (msg.type === 'response.audio_transcript.done') {
                speakingTimeout = setTimeout(() => setOrbState('ready'), 400);
            }

            // User started talking
            if (msg.type === 'input_audio_buffer.speech_started') {
                if (speakingTimeout) clearTimeout(speakingTimeout);
                setOrbState('listening');
            }

            // User stopped talking — brief glow then back to ready
            if (msg.type === 'input_audio_buffer.speech_stopped') {
                speakingTimeout = setTimeout(() => setOrbState('ready'), 600);
            }

            // Pass to original handler
            origHandler(event);
        };

        // Hook into setStatus for connection state
        const origSetStatus = setStatus;
        setStatus = function(state, text) {
            origSetStatus(state, text);
            if (state === 'connected') {
                setOrbState('ready');
            } else {
                setOrbState('idle');
            }
        };

        // Toggle transcript
        function toggleTranscript() {
            const el = document.getElementById('transcript');
            const toggle = document.getElementById('transcriptToggle');
            if (el.style.display === 'none') {
                el.style.display = '';
                toggle.textContent = 'Hide';
            } else {
                el.style.display = 'none';
                toggle.textContent = 'Show';
            }
        }
    </script>
</body>
</html>
